# version: '3.9'

services:
    # PostgreSQL Database
    postgres:
        image: postgres:16-alpine
        container_name: banking-api-postgres
        restart: unless-stopped
        ports:
            - '${DB_PORT:-5435}:5432'
        environment:
            POSTGRES_DB: ${DB_NAME:-banking}
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-banking}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - banking-network

    # Redis Cache & Session Store
    redis:
        image: redis:7-alpine
        container_name: banking-api-redis
        restart: unless-stopped
        ports:
            - '${REDIS_PORT:-6385}:6379'
        command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - banking-network

    # Node.js API Application
    api:
        image: node:20-alpine
        container_name: banking-api-app
        restart: unless-stopped
        ports:
            - '${APP_PORT:-5000}:5000'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            # App
            NODE_ENV: ${NODE_ENV:-production}
            PORT: 5000

            # Database
            DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-banking}

            # Redis
            REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379

            # JWT
            JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
            JWT_EXPIRY: ${JWT_EXPIRY:-24h}

            # App Keys
            LOG_LEVEL: ${LOG_LEVEL:-info}
        working_dir: /app
        volumes:
            - .:/app
        command: sh -c "npm install && npm run db:generate && npm start"
        networks:
            - banking-network
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # Nginx Reverse Proxy
    nginx:
        image: nginx:alpine
        container_name: banking-api-nginx
        restart: unless-stopped
        ports:
            - '${NGINX_PORT:-80}:80'
            - '${NGINX_PORT_SSL:-443}:443'
        depends_on:
            api:
                condition: service_healthy
        volumes:
            - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - banking-network
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--quiet',
                    '--tries=1',
                    '--spider',
                    'http://localhost/health',
                ]
            interval: 30s
            timeout: 10s
            retries: 3

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local

networks:
    banking-network:
        driver: bridge
